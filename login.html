<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="static/base.css">
    <link rel="stylesheet" href="static/navigation.css">
    <link rel="stylesheet" href="static/footer.css">
    <link rel="stylesheet" href="static/components.css">
    <link rel="stylesheet" href="static/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="navigation"></div>
    <main class="container-l">
        <div class="content-l">
            <div class="log-info">
                <h1>Welcome Back</h1>
                <p>Sign in to access your library</p>
            </div>
            <div class="form">
                <div class="email">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="reader@example.com">
                    </div>
                </div>
                <div class="password">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="demo123">
                        <i class="fas fa-eye"></i>
                    </div>
                </div>
            </div>
            <div class="links">
                <div class="link">
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember me</label>
                </div>
                <a href="#" class="fgt-pwd">Forgot password?</a>
            </div>
            <button type="button" class="btn-signin">Sign In<i class="fas fa-arrow-right"></i></button>
            <div class="divider">
                <span>Or continue with</span>
            </div>
            <div class="social-login">
                <button class="btn-social">
                    <i class="fab fa-google"></i> Google
                </button>
                <button class="btn-social">
                    <i class="fab fa-apple"></i> Apple
                </button>
            </div>
            <p class="signup-link">Don't have an account? <a href="signin.html">Create one</a></p>
        </div>
    </main>
    <div id="footer"></div>
    <script src="js/include.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
