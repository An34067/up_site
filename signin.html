<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signin</title>
    <link rel="stylesheet" href="static/base.css">
    <link rel="stylesheet" href="static/navigation.css">
    <link rel="stylesheet" href="static/footer.css">
    <link rel="stylesheet" href="static/components.css">
    <link rel="stylesheet" href="static/signin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="navigation"></div>

    <main class="container-s">
        <div class="signup-card">
            <div class="signup-header">
                <h1>Create Account</h1>
                <p>Join our community of book lovers</p>
            </div>
            <form class="signup-form">
                <div class="name-row">
                    <div class="form-group">
                        <label for="firstname">First Name</label>
                        <div class="input-wrap">
                            <i class="fas fa-user"></i>
                            <input type="text" id="firstname" placeholder="John" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="lastname">Last Name</label>
                        <div class="input-wrap">
                            <i class="fas fa-user"></i>
                            <input type="text" id="lastname" placeholder="Doe" required>
                        </div>
                    </div>
                </div> 
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="reader@example.com" required>
                    </div>
                </divup_site> 
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                        <i class="fas fa-eye toggle-password"></i>
                    </div>
                    <span class="password-hint">At least 8 characters</span>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirm-password" placeholder="••••••••" required>
                    </div>
                </div> 
                <div class="terms">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
                </div>
                <button type="button" class="btn-signup">Create Account <i class="fas fa-arrow-right"></i></button>
            </form>
            <div class="divider">
                <span>Or sign up with</span>
            </div>
            
            <div class="social-signup">
                <button class="btn-social">
                    <i class="fab fa-google"></i> Google
                </button>
                <button class="btn-social">
                    <i class="fab fa-apple"></i> Apple
                </button>
            </div>
            <p class="login-link">Already have an account? <a href="login.html">Sign in</a></p>
        </div>
    </main>

    <div id="footer"></div>
    <script src="js/include.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
